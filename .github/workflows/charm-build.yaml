name: Build Charm

on:
  workflow_call:
    inputs:
      path:
        description: Path to the charm directory (for monorepos)
        required: false
        default: .
        type: string
      arch:
        description: Target architecture (amd64, arm64, s390x, etc.)
        required: false
        default: amd64
        type: string
      runner:
        description: >
          GitHub Actions runner label(s). Use a JSON array string for self-hosted
          runners, e.g. '["self-hosted", "linux", "ARM64", "medium", "noble"]'
        required: false
        default: '"ubuntu-24.04"'
        type: string
      artifact-suffix:
        description: Suffix to append to the artifact key (for monorepos with multiple charms)
        required: false
        default: ""
        type: string
      charmcraft-channel:
        description: Snap channel for charmcraft
        required: false
        default: latest/stable
        type: string
      use-charmcraftcache:
        description: Use charmcraftcache (ccc) for faster builds
        required: false
        default: false
        type: boolean
      fetch-libs:
        description: Run charmcraft fetch-libs before building
        required: false
        default: false
        type: boolean
    outputs:
      name:
        description: Charm name from charmcraft.yaml
        value: ${{ jobs.build.outputs.name }}
      charm-paths:
        description: Comma-separated list of built .charm file names
        value: ${{ jobs.build.outputs.charm-paths }}
      artifacts-key:
        description: Artifact key for downloading built charms
        value: ${{ jobs.build.outputs.artifacts-key }}

jobs:
  build:
    name: Build (${{ inputs.arch }})
    runs-on: ${{ fromJson(inputs.runner) }}
    outputs:
      name: ${{ steps.info.outputs.name }}
      charm-paths: ${{ steps.paths.outputs.charm-paths }}
      artifacts-key: ${{ steps.info.outputs.artifacts-key }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0

      - name: Install yq
        run: sudo snap install yq

      - name: Determine build info
        id: info
        working-directory: ${{ inputs.path }}
        env:
          ARTIFACT_SUFFIX: ${{ inputs.artifact-suffix }}
        run: |
          set -euo pipefail
          echo "name=$(yq -r '.name' charmcraft.yaml)" >> "$GITHUB_OUTPUT"

          if [[ -n "$ARTIFACT_SUFFIX" ]]; then
            echo "artifacts-key=${{ github.sha }}-build-${ARTIFACT_SUFFIX}-${{ inputs.arch }}" >> "$GITHUB_OUTPUT"
          else
            echo "artifacts-key=${{ github.sha }}-build-${{ inputs.arch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup LXD
        uses: canonical/setup-lxd@main
        with:
          channel: 5.21/stable

      - name: Install charmcraft
        run: sudo snap install charmcraft --classic --channel ${{ inputs.charmcraft-channel }}

      - name: Install charmcraftcache
        if: ${{ inputs.use-charmcraftcache }}
        run: |
          pipx install charmcraftcache
          echo CHARMCRAFT_BIN=ccc >> "$GITHUB_ENV"

      - name: Fetch charm libraries
        if: ${{ inputs.fetch-libs }}
        run: charmcraft fetch-libs
        working-directory: ${{ inputs.path }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Build charm
        run: |
          BIN="${CHARMCRAFT_BIN:-charmcraft}"
          "$BIN" pack -v
        working-directory: ${{ inputs.path }}

      - name: Get charm paths
        id: paths
        working-directory: ${{ inputs.path }}
        run: |
          echo "charm-paths=$(ls *.charm | tr '\n' ',' | sed 's/,$//')" >> "$GITHUB_OUTPUT"

      - name: Upload charm artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.info.outputs.artifacts-key }}
          path: ${{ github.workspace }}/${{ inputs.path }}/*.charm
          if-no-files-found: error
          retention-days: 5
