name: Trivy Vulnerability Scanner

on:
  workflow_call:
    inputs:
      path:
        description: Path to the directory containing uv.lock
        required: false
        type: string
        default: .
      uv-lock-path:
        description: Path to uv.lock file relative to the path input
        required: false
        type: string
        default: 'uv.lock'
      severity:
        description: Comma-separated severity levels to report
        required: false
        type: string
        default: 'CRITICAL,HIGH,MEDIUM'

jobs:
  scan:
    name: Scan
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Run Trivy vulnerability scanner (table format)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: ${{ inputs.path }}/${{ inputs.uv-lock-path }}
          version: 'v0.58.0'
          format: 'table'
          severity: ${{ inputs.severity }}
          scanners: 'vuln'

      - name: Run Trivy vulnerability scanner (SARIF format)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'fs'
          scan-ref: ${{ inputs.path }}/${{ inputs.uv-lock-path }}
          version: 'v0.58.0'
          format: 'sarif'
          severity: ${{ inputs.severity }}
          scanners: 'vuln'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: "trivy-results.sarif"
          category: "Trivy Vulnerability Scan"
