name: Lint report

on:
  workflow_call:
    inputs:
      path:
        description: Path to the Grafana dashboards directory
        required: false
        type: string
        default: src/grafana_dashboards/*

jobs:
  lint-report:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26"

      - name: Install Grafana Dashboard Linter
        run: |
          git clone --depth 1 --branch v0.1.1 https://github.com/grafana/dashboard-linter.git /tmp/dashboard-linter
          cd /tmp/dashboard-linter
          go build -o /usr/local/bin/dashboard-linter .

      - name: Run Grafana Dashboard Lint
        run: dashboard-linter lint ${{ inputs.path }} --strict -c grafana.lint
