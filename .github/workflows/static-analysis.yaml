name: Static analysis

on:
  workflow_call:
    inputs:
      path:
        description: Path to the charm's root directory
        required: false
        type: string
        default: .
      fetch-libs:
        description: Run charmcraft fetch-libs before static analysis
        required: false
        default: false
        type: boolean

jobs:
  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install charmcraft
        if: ${{ inputs.fetch-libs }}
        run: sudo snap install charmcraft --classic

      - name: Fetch charmcraft libs
        if: ${{ inputs.fetch-libs }}
        run: charmcraft fetch-libs
        working-directory: ${{ inputs.path }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Install uv
        run: sudo snap install --classic astral-uv

      - name: Install tox
        run: uv tool install tox --with tox-uv

      - name: Run tests using tox
        run: tox -e static
        working-directory: ${{ inputs.path }}
