name: publish-charm

on:
  workflow_call:
    inputs:
      destination_channel:
        description: CharmHub channel to publish to
        required: true
        type: string
      branch-name:
        description: An additional branch name to append to the channel
        required: false
        default: ""
        type: string
      artifacts-key:
        description: Artifact key from build workflow output (format <sha>-<job>), comes from build-charm workflow
        required: true
        type: string
      charm-paths:
        description: Charm paths output from build workflow (<name>_<series-arch>.charm entries), comes from build-charm workflow
        required: true
        type: string
      tag-prefix:
        description: Tag prefix for GitHub releases (useful for monorepos with multiple charms)
        required: false
        type: string
        default: ""
      path:
        description: Path to the charm directory (for monorepos)
        required: false
        default: .
        type: string
    outputs:
      channel:
        description: "The release channel"
        value: ${{ jobs.publish-charm.outputs.channel }}
    secrets:
      CHARMCRAFT_AUTH:
        required: true

jobs:
  publish-charm:
    name: Publish Charm
    runs-on: ubuntu-24.04
    outputs:
      channel: ${{ steps.publish-channel.outputs.channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Determine publish channel
        id: publish-channel
        run: |
          channel="${{ inputs.destination_channel }}"
          branch="${{ inputs.branch-name }}"
          if [ -n "$branch" ]; then
            sanitized=$(echo "$branch" | sed 's#[/_.]#-#g')
            channel="$channel/$sanitized"
          fi
          echo "channel=$channel" >> $GITHUB_OUTPUT

      - name: Download charm artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifacts-key }}
          path: ${{ inputs.path }}

      - name: Upload charm to Charmhub
        uses: canonical/charming-actions/upload-charm@2.7.0
        with:
          credentials: ${{ secrets.CHARMCRAFT_AUTH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          channel: ${{ steps.publish-channel.outputs.channel }}
          destructive-mode: false
          charm-path: ${{ inputs.path }}
          built-charm-path: ${{ inputs.charm-paths }}
          github-tag: true
          tag-prefix: ${{ inputs.tag-prefix }}

      - name: Archive charmcraft logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: charmcraft-logs
          path: /home/runner/.local/state/charmcraft/log/*.log
