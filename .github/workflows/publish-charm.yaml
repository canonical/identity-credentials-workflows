name: publish-charm

on:
  workflow_call:
    inputs:
      path:
        description: Path to the charm's root directory
        required: false
        type: string
        default: ./
      track-name:
        description: Name of the charmhub track to publish the charm to
        type: string
      branch-name:
        default: ""
        description: An additional branch name to add to the track
        type: string
      artifact-name:
        default: built-charm
        description: Name of the artifact to download
        type: string
    secrets:
      CHARMCRAFT_AUTH:
        required: true

jobs:
  publish-charm:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Fetch Tested Charm
        uses: actions/download-artifact@v5
        with:
          name: ${{ inputs.artifact-name }}
          path: ${{ inputs.path }}

      - name: Get Charm Under Test Path
        id: charm-path
        shell: bash
        run: |
          dir='${{ inputs.path }}'
          file=$(echo "$dir"/*.charm)
          echo "charm_path=${file}" >> "$GITHUB_OUTPUT"

      - name: Install charmcraft
        run: sudo snap install charmcraft --classic

      - name: Sanitize the branch variable
        id: sanitize
        env:
          BRANCH_NAME: ${{ inputs.branch-name }}
        run: |
          echo sanitized=$(echo "$BRANCH_NAME" | sed 's/[/_.]/-/g' | sed "s/^/\//") >> $GITHUB_OUTPUT
        if: ${{ inputs.branch-name != '' }}

      - name: Upload charm to Charmhub
        uses: canonical/charming-actions/upload-charm@2.7.0
        with:
          charm-path: ${{ inputs.path }}
          built-charm-path: ${{ steps.charm-path.outputs.charm_path }}
          credentials: "${{ secrets.CHARMCRAFT_AUTH }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          channel: ${{ inputs.track-name }}/edge${{ steps.sanitize.outputs.sanitized }}
        if: ${{ inputs.track-name != '' }}

      - name: Select Charmhub channel
        uses: canonical/charming-actions/channel@2.7.0
        id: channel
        if: ${{ inputs.track-name == '' }}

      - name: Upload charm to Charmhub
        uses: canonical/charming-actions/upload-charm@2.7.0
        with:
          charm-path: ${{ inputs.path }}
          built-charm-path: ${{ steps.charm-path.outputs.charm_path }}
          credentials: "${{ secrets.CHARMCRAFT_AUTH }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"
          channel: ${{ steps.channel.outputs.name }}
        if: ${{ inputs.track-name == '' }}

      - name: Publish libs
        uses: canonical/charming-actions/release-libraries@2.7.0
        with:
          charm-path: ${{ inputs.path }}
          credentials: "${{ secrets.CHARMCRAFT_AUTH }}"
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Archive charmcraft logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: charmcraft-logs
          path: /home/runner/.local/state/charmcraft/log/*.log
