name: Lint PR Title
on:
  workflow_call:

permissions:
  pull-requests: read

jobs:
  lint-pr-title:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate conventional commit PR title
        uses: amannn/action-semantic-pull-request@e32d7e603df1aa1ba07e981f2a23455dee596825 # v5
        env:
          GITHUB_TOKEN: ${{ github.token }}
