name: Build (ARM)

on:
    workflow_call:
        inputs:
            charmcraft-channel:
                description: Snap channel for charmcraft
                required: false
                default: latest/stable
                type: string
            build-for-arm:
                description: If true, caller may choose to trigger this ARM build
                required: false
                default: true
                type: boolean
            path:
                description: Path to the charm directory (for monorepos)
                required: false
                default: .
                type: string
        outputs:
            name:
                description: Charm name from charmcraft.yaml
                value: ${{ jobs.build-charm-under-test.outputs.name }}
            platforms:
                description: JSON array of platforms like ["ubuntu@24.04:arm64"]
                value: ${{ jobs.build-charm-under-test.outputs.platforms }}
            charm-paths:
                description: Comma-separated <name>_<series-arch>.charm (arm64 only)
                value: ${{ jobs.build-charm-under-test.outputs.paths }}
            artifacts-key:
                description: Artifact identifier <sha>-<job>-arm64
                value: ${{ jobs.build-charm-under-test.outputs.artifacts }}

jobs:
    build-charm-under-test:
        runs-on: [self-hosted, linux, ARM64, medium, noble]
        outputs:
            name: ${{ steps.get-charm-info.outputs.charm-name }}
            platforms: ${{ steps.get-charm-info.outputs.charm-platforms }}
            paths: ${{ steps.get-charm-paths.outputs.charm-paths }}
            artifacts: ${{ steps.artifact-name.outputs.artifact }}
        steps:
            - name: Checkout
              uses: actions/checkout@v5
              with:
                  fetch-depth: 0

            - name: Setup LXD
              uses: canonical/setup-lxd@main
              with:
                  channel: 5.21/stable

            - name: Install charmcraft
              run: sudo snap install charmcraft --classic --channel ${{ inputs.charmcraft-channel }}

            - name: Install yq
              run: sudo snap install yq

            - name: Build charm under test
              run: charmcraft pack -v
              working-directory: ${{ inputs.path }}

            - name: Get charm info
              id: get-charm-info
              run: |
                  echo charm-name=$(yq -r '.name' charmcraft.yaml) >> $GITHUB_OUTPUT
                  platforms=$(yq -o=json '.bases // .platforms | keys' charmcraft.yaml | jq -c 'map(select(endswith(":arm64")))')
                  echo charm-platforms=$platforms >> $GITHUB_OUTPUT
              working-directory: ${{ inputs.path }}

            - name: Get charm paths
              id: get-charm-paths
              run: |
                  echo charm-paths=$(echo '${{ steps.get-charm-info.outputs.charm-platforms }}' | jq -r --arg charm '${{ steps.get-charm-info.outputs.charm-name }}' 'map(split(":") | join("-")) | map($charm + "_" + . + ".charm") | join(",")') >> $GITHUB_OUTPUT

            - name: Generate artifact name
              id: artifact-name
              run: echo artifact='${{ github.sha }}-${{ github.job }}-arm64' >> $GITHUB_OUTPUT

            - name: Upload charm artifacts
              uses: actions/upload-artifact@v4
              with:
                  name: ${{ steps.artifact-name.outputs.artifact }}
                  path: ${{ github.workspace }}/${{ inputs.path }}/*.charm
                  if-no-files-found: error
                  retention-days: 5
