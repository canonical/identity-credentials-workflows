name: Publish charm

on:
  workflow_call:
    inputs:
      destination_channel:
        description: CharmHub channel to publish to
        required: true
        type: string
      artifacts-key:
        description: Key used to download the charm artifacts
        required: true
        type: string
      charm-paths:
        description: Comma-separated list of exact charm file paths
        required: true
        type: string
    outputs:
      channel:
        description: "The release channel"
        value: ${{ jobs.publish-charm.outputs.channel }}
    secrets:
      CHARMCRAFT_AUTH:
        required: true

jobs:
  publish-charm:
    name: Publish Charm
    runs-on: ubuntu-24.04
    outputs:
      channel: ${{ inputs.destination_channel }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Download charm artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifacts-key }}

      - name: Upload charm to Charmhub
        uses: canonical/charming-actions/upload-charm@2.7.0
        with:
          credentials: ${{ secrets.CHARMCRAFT_AUTH }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          channel: ${{ inputs.destination_channel }}
          destructive-mode: false
          built-charm-path: ${{ inputs.charm-paths }}
          github-tag: false

      - name: Archive charmcraft logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: charmcraft-logs
          path: /home/runner/.local/state/charmcraft/log/*.log
