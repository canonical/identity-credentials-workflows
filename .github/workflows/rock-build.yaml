name: Build Rock

on:
  workflow_call:
    inputs:
      path:
        description: Path to the rock directory (for monorepos)
        required: false
        default: .
        type: string
      arch:
        description: Target architecture (amd64, arm64, s390x, etc.)
        required: false
        default: amd64
        type: string
      runner:
        description: >
          GitHub Actions runner label(s). Use a JSON array string for self-hosted
          runners, e.g. '["self-hosted", "linux", "ARM64", "medium", "noble"]'
        required: false
        default: '"ubuntu-24.04"'
        type: string
      artifact-suffix:
        description: Suffix to append to the artifact key (for monorepos with multiple rocks)
        required: false
        default: ""
        type: string
      rockcraft-channel:
        description: Snap channel for rockcraft
        required: false
        default: latest/stable
        type: string
      structure-tests-enabled:
        description: Run container structure tests after build
        required: false
        default: false
        type: boolean
      sbom-enabled:
        description: Generate SBOM for each architecture
        required: false
        default: true
        type: boolean
    outputs:
      name:
        description: Rock name from rockcraft.yaml
        value: ${{ jobs.build.outputs.name }}
      artifacts-key:
        description: Artifact key for downloading built rocks
        value: ${{ jobs.build.outputs.artifacts-key }}

jobs:
  build:
    name: Build (${{ inputs.arch }})
    runs-on: ${{ fromJson(inputs.runner) }}
    outputs:
      name: ${{ steps.info.outputs.name }}
      artifacts-key: ${{ steps.info.outputs.artifacts-key }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4

      - name: Install yq
        run: sudo snap install yq

      - name: Determine build info
        id: info
        working-directory: ${{ inputs.path }}
        env:
          ARTIFACT_SUFFIX: ${{ inputs.artifact-suffix }}
        run: |
          set -euo pipefail
          echo "name=$(yq -r '.name' rockcraft.yaml)" >> "$GITHUB_OUTPUT"

          if [[ -n "$ARTIFACT_SUFFIX" ]]; then
            echo "artifacts-key=${{ github.sha }}-build-${ARTIFACT_SUFFIX}-${{ inputs.arch }}" >> "$GITHUB_OUTPUT"
          else
            echo "artifacts-key=${{ github.sha }}-build-${{ inputs.arch }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build rock
        uses: canonical/craft-actions/rockcraft-pack@main
        id: rockcraft
        with:
          path: ${{ inputs.path }}

      - name: Install rockcraft for skopeo
        if: ${{ inputs.structure-tests-enabled }}
        run: sudo snap install rockcraft --classic --edge

      - name: Install container structure test
        if: ${{ inputs.structure-tests-enabled }}
        run: |
          mkdir -p bin/
          curl -Lo bin/container-structure-test https://storage.googleapis.com/container-structure-test/latest/container-structure-test-linux-amd64
          chmod +x bin/container-structure-test
          echo "$GITHUB_WORKSPACE/bin" >> "$GITHUB_PATH"

      - name: Run container structure tests
        if: ${{ inputs.structure-tests-enabled }}
        run: |
          sudo rockcraft.skopeo --insecure-policy copy \
            oci-archive:"$(realpath ./${{ steps.rockcraft.outputs.rock }})" \
            docker-daemon:"ghcr.io/${{ github.repository }}:${{ github.sha }}"
          container-structure-test test -c structure-tests.yaml \
            -i "ghcr.io/${{ github.repository }}:${{ github.sha }}"

      - name: Generate SBOM
        if: ${{ inputs.sbom-enabled }}
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft "${{ steps.rockcraft.outputs.rock }}" -o spdx-json="${{ steps.rockcraft.outputs.rock }}.sbom.json"

      - name: Upload SBOM
        if: ${{ inputs.sbom-enabled }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.info.outputs.artifacts-key }}-sbom
          path: "${{ steps.rockcraft.outputs.rock }}.sbom.json"

      - name: Upload rock artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.info.outputs.artifacts-key }}
          path: "${{ steps.rockcraft.outputs.rock }}"
