name: Publish Snap

on:
  workflow_call:
    inputs:
      artifacts-key:
        description: Artifact key from snap-build workflow output
        required: true
        type: string
      track:
        description: Snap track
        required: false
        default: latest
        type: string
      channel:
        description: Snap channel
        required: false
        default: edge
        type: string
    secrets:
      SNAPCRAFT_STORE_CREDENTIALS:
        required: true

jobs:
  publish:
    name: Publish Snap
    runs-on: ubuntu-24.04
    steps:
      - name: Download snap artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.artifacts-key }}

      - name: Publish snap
        env:
          SNAPCRAFT_STORE_CREDENTIALS: ${{ secrets.SNAPCRAFT_STORE_CREDENTIALS }}
          RELEASE_CHANNEL: ${{ inputs.track }}/${{ inputs.channel }}
        run: |
          set -euo pipefail
          snap_file=$(ls *.snap | head -n 1)
          echo "Publishing $snap_file to $RELEASE_CHANNEL"
          snapcraft upload "$snap_file" --release "$RELEASE_CHANNEL"
